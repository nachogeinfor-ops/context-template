name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint + Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install test deps
        run: |
          python -m pip install --upgrade pip
          pip install -r tests/requirements.txt

      - name: Run pytest (contract + lint tests)
        run: pytest -v

      - name: Lint the two filled fixtures
        run: |
          bash scripts/lint-template.sh tests/fixtures/sample-node-repo
          bash scripts/lint-template.sh tests/fixtures/sample-python-repo

      - name: Skeleton must FAIL lint (placeholders are intentional)
        run: |
          if bash scripts/lint-template.sh template; then
            echo "ERROR: lint passed on template/ — placeholders should make it fail" >&2
            exit 1
          fi
          echo "✓ Skeleton correctly fails lint as expected"
